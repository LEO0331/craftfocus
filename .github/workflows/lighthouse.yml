name: Lighthouse CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
    
permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      - name: Prepare subpath for GitHub Pages parity
        run: |
          rm -rf .lighthouse-site
          mkdir -p .lighthouse-site/craftfocus
          cp -R dist/. .lighthouse-site/craftfocus/

      - name: Serve static site
        run: |
          python3 -m http.server 4174 --directory .lighthouse-site &
          echo $! > server.pid
          sleep 2

      - name: Run Lighthouse
        run: |
          npx lighthouse http://127.0.0.1:4174/craftfocus/ \
            --only-categories=performance,accessibility,best-practices,seo \
            --chrome-flags="--headless --no-sandbox" \
            --output=json --output=html \
            --output-path=./lighthouse-report

      - name: Upload Lighthouse artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            lighthouse-report.report.json
            lighthouse-report.report.html

      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true
