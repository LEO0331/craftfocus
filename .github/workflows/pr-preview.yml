name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build static web
        if: github.event.action != 'closed'
        run: npx expo export --platform web

      - name: Deploy/Remove PR preview
        id: pr-preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      - name: Print preview URL
        if: steps.pr-preview.outputs.deployment-action == 'deploy'
        run: echo "Preview URL: ${{ steps.pr-preview.outputs.preview-url }}"
